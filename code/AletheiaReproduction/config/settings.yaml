provider: "${LLM_PROVIDER}"   # "deepseek" 或 "volcano"

llm_defaults:
  thinking: true
  max_tokens: 16384
  connect_timeout_seconds: 30
  # 例如 DeepSeek V3.2 在复杂 IMO 题上首包可能较慢，读写超时不宜过短。
  read_timeout_seconds: 600
  write_timeout_seconds: 600
  pool_timeout_seconds: 30
  stream_max_retries: 2

deepseek:
  api_key: "${DEEPSEEK_API_KEY}"      # 从环境变量读取
  base_url: "https://api.deepseek.com"
  model: "deepseek-chat"               # 统一模型名 (DeepSeek-V3.2, 128K 上下文)

volcano:
  api_key: "${VOLCANO_API_KEY}"        # 火山方舟 API Key
  base_url: "${VOLCANO_BASE_URL}"      # 默认 https://ark.cn-beijing.volces.com/api/v3
  model: "${VOLCANO_MODEL}"            # 默认 deepseek-v3-2-251201
  # ⚠️ DeepSeek V3.2 API 要点（参见 DeepSeekAPI使用指南.md）：
  #   - deepseek-chat + extra_body={"thinking":{"type":"enabled"}} 等效于 deepseek-reasoner
  #   - 思考模式下 temperature/top_p/presence_penalty/frequency_penalty 参数不生效
  #   - 思考模式输出两个字段：reasoning_content（思维链）+ content（最终回答）
  #   - 多轮对话中，上一轮的 reasoning_content 不拼入上下文，只传 content
  #   - 工具调用场景：同一 turn 内子请求必须回传 reasoning_content；新 turn 必须清除

tools:
  e2b_api_key: "${E2B_API_KEY}"        # 代码沙箱
  semantic_scholar_api_key: "${SEMANTIC_SCHOLAR_API_KEY}"  # 学术搜索 (Semantic Scholar API, 可选但推荐)

agent:
  max_turns: 3
  worklog_llm_timeout_seconds: 120

orchestrator:
  mode: hybrid_loop
  enable_stage_state: true
  event_log: true

resilience:
  llm_retry_max_attempts: 3
  tool_retry_max_attempts: 2
  tool_retry_backoff_seconds: 0.2
  max_rounds: 20
  tool_timeout_seconds: 30

retrieval:
  depth: full
  enable_query_expansion: true
  sources: [openalex, arxiv]
  max_results_per_query: 10
  retry_attempts: 2
  retry_backoff_seconds: 0.2
  dedup:
    keys: [doi, arxiv_id, normalized_title]

verifier:
  citation_review:
    enabled: true
    trigger_when_citation_present: true
    subagent: citation_reviewer
    mode: soft
    checks:
      - path_exists
      - claim_source_match
      - metadata_consistency
      - doi_openalex_arxiv_title_cascade
    warn_only: true
    hard_fail_threshold: 0.4

repro:
  snapshot_prompts: true
  snapshot_settings: true
